# WindowPanes Configuration
# Arkab portrait display — 1x3 grid

layout:
  rows: 3
  columns: 1

panes:
  - type: rotating_websites
    position: {row: 1, col: 1}
    proxy: true
    urls:
      - https://www.clockfaceonline.co.uk/clocks/text/
      - https://www.google.com/maps/@42.3032953,-71.0772834,12.2z/data=!5m1!1e1
      - https://www.airnavradar.com/@42.31660,-71.10656,z10?ground=false
      - https://trends.google.com/trends/hottrends/visualize?nrow=5&ncol=5
      - https://apod.nasa.gov/apod/
      - https://science.nasa.gov/mission/webb/what-is-webb-observing/#WhatIsWebbObservingTool
    interval: 25
    order: sequential

  - type: rotating_websites
    position: {row: 2, col: 1}
    proxy: true
    urls:
      - https://forecast.weather.gov/MapClick.php?lat=42.31648500000006&lon=-71.10715999999996#.ZGLYV9LMJB0
      - https://www.star.nesdis.noaa.gov/goes/sector_band.php?sat=G16&sector=eus&band=GEOCOLOR&length=24&dim=1
      - https://www.windy.com/-Weather-radar-radar?radar,42.876,-71.548,7
      - https://www.ventusky.com/?p=42.36;-71.06;6&l=feel
      - https://www.ventusky.com/?p=42.36;-71.06;6&l=radar
      - https://www.airnow.gov/?city=Jamaica%20Plain&state=MA&country=USA
      - https://www.spaceweatherlive.com/en/solar-activity.html
      - https://www.windy.com/-Weather-radar-radar?radar,55.985,-2.796,8
      - https://www.ventusky.com/?p=56.34;-2.79;6&l=feel
      - https://www.ventusky.com/?p=56.34;-2.79;6&l=radar
    interval: 30
    order: sequential

  - type: rotating_websites
    position: {row: 3, col: 1}
    proxy: true
    urls:
      - http://www.thecolourclock.com/
      - https://news.ycombinator.com
      - https://finance.yahoo.com/world-indices/
      - https://www.npr.org/
      - https://www.wgbh.org/news
      - https://jamaicaplaingazette.com/
      - https://www.scotsman.com/
      - https://newsmap.ijmacd.com/?edition=US_en
      - https://www.mlb.com/standings/
      - https://www.bbc.com/sport/golf/uspga-tour/leaderboard
      - https://www.espn.com/golf/rankings
      - https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/news
    interval: 35
    order: sequential


