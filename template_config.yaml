# WindowPanes Configuration
# Kitchen portrait display — 1x3 grid

layout:
  rows: 3
  columns: 1

panes:
  - type: video_playlist
    position: {row: 1, col: 1}
    videos:
      - /media/clips/saber_duels/saber_01.mkv
      - /media/clips/saber_duels/saber_02.mkv
    loop: true
    muted: true
    order: random        # 'sequential' (default) or 'random'

  - type: website
    position: {row: 2, col: 1}
    url: https://weather.com/local

  - type: rotating_websites
    position: {row: 3, col: 1}
    urls:
      - https://news.ycombinator.com
      - https://reddit.com/r/starwars
    interval: 30
    order: sequential    # 'sequential' (default) or 'random'

# ── noVNC example ───────────────────────────────────────────────────────────
# To show a remote desktop pane, add a pane like this and run websockify
# on the WindowPanes machine pointing at the target machine's VNC port.
#
# Prerequisites:
#   1. Enable Screen Sharing on the target Mac Mini
#      (System Settings → General → Sharing → Screen Sharing, VNC on port 5900)
#   2. Install noVNC + websockify on this machine:
#      sudo apt install novnc websockify
#   3. Start the proxy (or use the provided systemd service):
#      websockify --web /usr/share/novnc 6080 <MAC_MINI_IP>:5900
#
# Then uncomment and adjust the pane below:
#
#  - type: novnc
#    position: {row: 1, col: 1}
#    novnc_url: "http://localhost:6080/vnc.html?host=localhost&port=6080&autoconnect=true&resize=scale&password=YOURPASSWORD"

# ── proxied_website example ─────────────────────────────────────────────
# Use for sites that send X-Frame-Options: DENY or CSP frame-ancestors
# (e.g. weather.com, reddit.com, nytimes.com) — the server fetches them
# server-side and strips those headers. The iframe loads the proxied URL
# from the same origin as the dashboard, so framing is allowed.
#
# Then uncomment and adjust the pane below:
#
#  - type: proxied_website
#    position: {row: 2, col: 1}
#    url: https://weather.com/local

# ── rotating_websites with proxy ────────────────────────────────────────
# Same as rotating_websites, but each URL is wrapped through the server-side
# /api/proxy endpoint so iframe-blocking headers (X-Frame-Options: DENY,
# CSP frame-ancestors) are stripped before the iframe loads. Use this when
# you want to cycle through sites that don't normally allow embedding.
#
# Then uncomment and adjust the pane below:
#
#  - type: rotating_websites
#    position: {row: 3, col: 1}
#    proxy: true
#    urls:
#      - https://weather.com/local
#      - https://www.reddit.com/r/all/
#      - https://trends.google.com/trends/hottrends/visualize
#    interval: 30
#    order: random

# ── xscreensaver pane (Linux + Xvfb required) ────────────────────────
# Mimics XScreenSaver inside a WindowPanes pane. Each pane allocates its
# own Xvfb display (default starting at :99) and serves a polled JPEG of
# the running screensaver at /api/screensaver/<pane-id>.jpg.
#
# Requirements on the host (apt names):
#   xvfb, ffmpeg, xscreensaver (for the daemon + modules), x11-apps (for
#   the modules to draw). On Debian/Ubuntu:
#     sudo apt install xvfb ffmpeg xscreensaver xscreensaver-data-extra xscreensaver-gl x11-apps
#
# Modes:
#   single           — run one named module forever
#   list-sequential  — cycle modules list in order, looping
#   list-random      — pick from modules list, never repeating immediately
#   all-sequential   — enumerate *installed* modules; cycle in order
#   all-random       — enumerate *installed* modules; random, no repeats
#
# Then uncomment and adjust any of the panes below:
#
#  - type: xscreensaver                  # single mode — runs Qix forever
#    position: {row: 1, col: 1}
#    mode: single
#    modules: [Qix]
#    interval: 30                         # ignored in 'single'
#    width: 1280
#    height: 720
#    display: 99                         # Xvfb display number (auto-incremented)
#
#  - type: xscreensaver                  # list-random — shuffle a fixed set
#    position: {row: 2, col: 1}
#    mode: list-random
#    modules:
#      - GLMatrix
#      - Decays
#      - Qix
#      - Flurry
#      - Carousel
#    interval: 45                         # seconds per module before swapping
#
#  - type: xscreensaver                  # list-sequential — fixed cycle
#    position: {row: 3, col: 1}
#    mode: list-sequential
#    modules: [Qix, GLMatrix, Decays]
#    interval: 60
#
#  - type: xscreensaver                  # all-random — play everything installed
#    position: {row: 1, col: 1}
#    mode: all-random
#    interval: 30                         # modules list auto-enumerated at boot
#
#  - type: xscreensaver                  # all-sequential — walk everything installed
#    position: {row: 2, col: 1}
#    mode: all-sequential
#    interval: 45


# ── Authentication on proxied panes ──────────────────────────────────────
# proxied_website panes (and `proxy: true` website / rotating_websites)
# support three auth shapes via the `auth:` block. Use one method per pane;
# setting more than one is rejected at startup as ambiguous. For secrets,
# interpolate from process.env with ${VAR_NAME} so they never live in
# config.yaml.
#
#   - type: proxied_website
#     url: https://hub.example.com/
#     auth:
#       basic:                              # HTTP Basic Auth
#         username: ${BESZEL_USER}
#         password: ${BESZEL_PASSWORD}
#
#   - type: proxied_website
#     url: https://api.example.com/dashboard
#     auth:
#       bearer: ${API_TOKEN}               # Authorization: Bearer <token>
#
#   - type: proxied_website
#     url: https://internal.example.com/
#     auth:
#       cookie: "session=abcdef1234567890"  # raw Cookie header value
#
# When auth is set, the proxy also routes asset subrequests (CSS/JS/images)
# back through /api/proxy so the browser's fetches pick up auth too.
# Without that, the HTML loads but static assets 401 and the iframe blanks.
#
# URL fragments (#anchor) on proxied URLs are preserved and passed through
# to the iframe, so deep links scroll to the matching element in the
# rewritten document (works for most pages; pages that load anchors via
# client-side hydration may need a follow-up scroll-snippet).
